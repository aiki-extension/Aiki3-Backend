name: Build & Deploy Backend

on:
  push:
    branches: [main, deployment]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/aiki
  DEPLOY_DIR: /home/${{ secrets.DEPLOY_USER }}

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/api.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache,mode=max

  deploy:
    name: Deploy to Pi
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up direct SSH access
      - name: Configure SSH key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.VPS_PRIVATEKEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Copy compose file to server
      - name: Copy docker-compose to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          scp deployment/docker-compose.server.yml \
            $DEPLOY_USER@$DEPLOY_HOST:${{ env.DEPLOY_DIR }}/docker-compose.server.yml

      # SSH into Pi and deploy
      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST bash -s <<EOF
          set -e
          cd ${{ env.DEPLOY_DIR }}
          cat > .env <<ENVEOF
          IMAGE_NAME=${{ env.IMAGE_NAME }}
          IMAGE_TAG=${{ github.sha }}
          POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD="${{ secrets.PROD_POSTGRES_PASSWORD }}"
          POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
          JWT_SECRET="${{ secrets.PROD_JWT_SECRET }}"
          TMDB_READ_ACCESS_TOKEN="${{ secrets.PROD_TMDB_READ_ACCESS_TOKEN }}"
          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          RESEND_FROM_EMAIL="${{ secrets.RESEND_FROM_EMAIL }}"
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          ENVEOF
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker compose --env-file .env -f docker-compose.server.yml up -d --remove-orphans
          docker image prune -f
          EOF