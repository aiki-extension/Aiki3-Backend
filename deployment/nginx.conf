server {
    listen 80;
    server_name zeeguu.dev www.zeeguu.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name zeeguu.dev www.zeeguu.dev;

    ssl_certificate /etc/letsencrypt/live/zeeguu.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeeguu.dev/privkey.pem;

    location = /ic-manager {
        return 301 /ic-manager/;
    }
    location /ic-manager/ {
        proxy_pass http://aiki_ic_manager;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}